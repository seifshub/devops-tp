---
- name: Deploy Flask App to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    docker_image: "{{ lookup('env', 'DOCKER_IMAGE') | default('yourdockerhub/flask-app:latest') }}"
    app_namespace: "flask-app"

  tasks:
    - name: Validate docker_image is set
      assert:
        that:
          - docker_image != 'yourdockerhub/flask-app:latest'
        fail_msg: "docker_image must be passed via -e docker_image=..."

    - name: Verify kubectl can connect to cluster
      command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Show cluster info
      debug:
        var: cluster_info.stdout_lines

    - name: Deploy application (Deployment)
      kubernetes.core.k8s:
        state: present
        template: k8s/deployment.yaml

    - name: Apply Service
      kubernetes.core.k8s:
        state: present
        template: k8s/service.yaml

    - name: Apply Ingress
      kubernetes.core.k8s:
        state: present
        template: k8s/ingress.yaml

    - name: Wait for deployment to be ready
      command: >
        kubectl rollout status deployment/flask-app
        -n {{ app_namespace }}
        --timeout=120s
      changed_when: false

    - name: Get pod status
      command: kubectl get pods -n {{ app_namespace }}
      register: pod_status
      changed_when: false

    - name: Display pods
      debug:
        var: pod_status.stdout_lines